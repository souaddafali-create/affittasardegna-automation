nde","bh_join_v2_faq_more_cta":"Hai altre domande? Trova le risposte nelle nostre {start_link}Domande Frequenti{end_link}","bh_join_v2_faq_online_body":"Quando avrai completato il tuo annuncio, potrai attivarlo sul nostro sito e iniziare a ricevere prenotazioni. Prima di andare online potremmo chiederti di verificare la tua struttura, ma nel frattempo potrai cominciare a familiarizzare con l'extranet e prepararti ad accogliere i tuoi ospiti.","bh_join_v2_faq_online_subheader":"Quando sarà online la mia struttura?","bh_join_v4_global_base_cta":"Raggiungi subito nuovi ospiti","bh_join_v4_global_base_vp_international_stat_body":"prenotate per soggiorni internazionali alla fine del 2023.","bh_join_v4_global_base_vp_international_stat_head":"48% delle notti","bh_join_v4_global_base_vp_rental_guests_stat_body":"di ospiti nelle case vacanze dal 2010.","bh_join_v4_global_base_vp_rental_guests_stat_head":"Oltre 1,8 miliardi","bh_join_v4_global_base_vp_room_nights_stat_body":"notti prenotate nel 2024 sono state in case vacanze.","bh_join_v4_global_base_vp_room_nights_stat_head":"1 su 3","bh_join_v4_hero_main_sub":"Inserisci la tua attività su una delle app di viaggio più scaricate al mondo per guadagnare di più, più velocemente e raggiungere nuovi mercati.","bh_join_v4_host_worryfree_cta":"Inizia subito a lavorare con noi","bh_join_v4_host_worryfree_section_head":"Lavora con serenità: puoi sempre contare su di noi.","bh_join_v4_host_worryfree_vp_know_guests_bullet2":"Accedi alle informazioni sulla cronologia dei viaggi degli ospiti.","bh_join_v4_host_worryfree_vp_know_guests_subhead":"Conosci i tuoi ospiti","bh_join_v4_host_worryfree_vp_protected_bullet2":"Opzioni di {start_link}protezione dai danni{end_link} tra cui scegliere.","bh_join_v4_host_worryfree_vp_protected_subhead":"Sicurezza garantita","bh_join_v4_host_worryfree_vp_rules_bullet1":"Accetta o rifiuta le prenotazioni con la funzionalità {start_link}Richiesta di prenotazione{end_link}.","bh_join_v4_host_worryfree_vp_
