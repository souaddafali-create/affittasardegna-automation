name: CaseVacanza - Villa La Vela

on:
  push:
    branches: [main]
    paths:
      - 'Villa_La_Vela_DATI.json'
      - 'casevacanza_uploader.py'
  workflow_dispatch:

concurrency:
  group: casevacanza-villa-la-vela
  cancel-in-progress: true

jobs:
  upload:
    runs-on: ubuntu-latest
    environment: Default

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run uploader (Villa La Vela)
        env:
          CASEVACANZA_EMAIL: ${{ secrets.CASEVACANZA_EMAIL }}
          CASEVACANZA_PASSWORD: ${{ secrets.CASEVACANZA_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PROPERTY_NAME: Villa La Vela
        run: xvfb-run python casevacanza_uploader.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: villa-la-vela-debug-screenshots
          path: screenshots/
